<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de APK</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📦 Generador de APK</h1>
        <p>Selecciona los archivos que quieres incluir en la app y genera tu APK</p>

        <form id="upload-form">
            <input type="file" id="files" multiple>
            <button type="submit">Generar APK</button>
        </form>

        <div id="status"></div>
    </div>

    <script>
        const form = document.getElementById('upload-form');
        const status = document.getElementById('status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const files = document.getElementById('files').files;
            if (!files.length) return alert("Selecciona al menos un archivo");

            status.innerText = "Procesando...";

            // Aquí se llamaría a tu backend Python/Node que genera la APK
            // Ejemplo: fetch('/generate', { method: 'POST', body: formData })
        });
    </script>
</body>
</html>
