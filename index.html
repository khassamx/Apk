<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mally Wear App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Mally Wear</h1>
    <p>¡Tu tienda virtual en tu app!</p>
  </header>

  <main>
    <section class="products">
      <div class="product">
        <img src="assets/cap1.png" alt="Cap 1">
        <h2>Gorra Negra</h2>
        <button onclick="addToCart('Gorra Negra')">Agregar al carrito</button>
      </div>
      <div class="product">
        <img src="assets/cap2.png" alt="Cap 2">
        <h2>Gorra Blanca</h2>
        <button onclick="addToCart('Gorra Blanca')">Agregar al carrito</button>
      </div>
    </section>
  </main>

  <footer>
    <p>Contactanos: WhatsApp / Instagram</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
