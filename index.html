<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub → APK</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>📦 Convierte tu GitHub en APK</h1>
    <p>Pega el enlace de tu repositorio y genera tu APK</p>

    <form id="github-form">
        <input type="url" id="github-link" placeholder="https://github.com/usuario/repositorio" required>
        <button type="submit">Generar APK</button>
    </form>

    <p>O sube archivos de tu proyecto:</p>
    <form id="upload-form">
        <input type="file" id="files" multiple>
        <button type="submit">Generar APK</button>
    </form>

    <div id="status"></div>
</div>

<script>
document.getElementById('github-form').addEventListener('submit', async e => {
    e.preventDefault();
    const link = document.getElementById('github-link').value;
    if (!link) return alert("Pega un enlace válido");

    const status = document.getElementById('status');
    status.innerText = "Generando APK desde GitHub...";

    const res = await fetch('/generate_from_github', {
        method: 'POST',
        body: JSON.stringify({url: link}),
        headers: {'Content-Type': 'application/json'}
    });

    if (res.ok) {
        const blob = await res.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'app-debug.apk';
        a.click();
        status.innerText = "APK lista para descargar ✅";
    } else {
        status.innerText = "Error generando APK ❌";
    }
});

document.getElementById('upload-form').addEventListener('submit', async e => {
    e.preventDefault();
    const files = document.getElementById('files').files;
    if (!files.length) return alert("Sube al menos un archivo");

    const formData = new FormData();
    for (let f of files) formData.append('files', f);

    const status = document.getElementById('status');
    status.innerText = "Generando APK desde archivos...";

    const res = await fetch('/generate', { method: 'POST', body: formData });
    if (res.ok) {
        const blob = await res.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'app-debug.apk';
        a.click();
        status.innerText = "APK lista para descargar ✅";
    } else {
        status.innerText = "Error generando APK ❌";
    }
});
</script>
</body>
</html>
